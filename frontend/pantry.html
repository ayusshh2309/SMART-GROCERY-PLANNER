<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart Grocery Planner — Pantry</title>
    <style>
      :root {
        --bg: #07110c;
        --paper: #0f1712;
        --ink: #f3f8f4;
        --ink-soft: #8da393;
        --line: rgba(122, 164, 132, 0.2);
        --sidebar: #050a08;
        --sidebar-text: #8da393;
        --sidebar-active: #163423;
        --herb: #2fd36a;
        --herb-light: rgba(47, 211, 106, 0.16);
        --amber: #f0b04b;
        --amber-light: rgba(240, 176, 75, 0.16);
        --coral: #ff6b6b;
        --coral-light: rgba(255, 107, 107, 0.16);
        --blue: #5aa3ff;
        --blue-light: rgba(90, 163, 255, 0.16);
        --plum: #8c7ef5;
        --plum-light: rgba(140, 126, 245, 0.16);
        --radius: 16px;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        background: radial-gradient(
          circle at top left,
          #0f1d14 0%,
          var(--bg) 45%,
          #050806 100%
        );
        color: var(--ink);
        font-family:
          ui-sans-serif,
          -apple-system,
          "Segoe UI",
          Roboto,
          sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      h1,
      h2,
      h3 {
        font-family: ui-sans-serif, sans-serif;
        font-weight: 700;
        letter-spacing: -0.01em;
        margin: 0;
      }
      .mono {
        font-family: ui-monospace, "SFMono-Regular", Consolas, monospace;
        font-weight: 600;
      }
      button,
      input,
      select {
        font-family: inherit;
      }
      :focus-visible {
        outline: 2px solid var(--herb);
        outline-offset: 2px;
      }

      .shell {
        display: flex;
        min-height: 100vh;
      }

      /* Sidebar */
      .sidebar {
        width: 230px;
        flex-shrink: 0;
        background: var(--sidebar);
        color: var(--sidebar-text);
        display: flex;
        flex-direction: column;
        padding: 18px 14px;
      }
      .brand {
        display: flex;
        align-items: center;
        gap: 9px;
        padding: 6px 6px 22px;
      }
      .brand .mark {
        width: 34px;
        height: 34px;
        border-radius: 9px;
        background: var(--herb);
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }
      .brand .name {
        color: #fff;
        font-size: 14px;
        line-height: 1.25;
      }
      .brand .name span {
        display: block;
        font-size: 11px;
        color: var(--sidebar-text);
        font-weight: 400;
      }
      nav {
        display: flex;
        flex-direction: column;
        gap: 2px;
      }
      .nav-item {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 9px 10px;
        border-radius: 9px;
        font-size: 13.5px;
        font-weight: 500;
        color: var(--sidebar-text);
        border: none;
        background: none;
        text-align: left;
        width: 100%;
        text-decoration: none;
      }
      .nav-item svg {
        flex-shrink: 0;
        opacity: 0.85;
      }
      .nav-item:hover {
        background: #1b2c22;
        color: #fff;
      }
      .nav-item.active {
        background: var(--sidebar-active);
        color: #fff;
      }
      .nav-item.active svg {
        opacity: 1;
        color: #7cd49b;
      }
      .nav-divider {
        height: 1px;
        background: #22302a;
        margin: 14px 4px;
      }

      /* Main */
      .main {
        flex: 1;
        min-width: 0;
        padding: 22px 28px 50px;
      }
      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 22px;
        gap: 20px;
        flex-wrap: wrap;
      }
      .topbar h1 {
        font-size: 21px;
      }
      .topbar .sub {
        font-size: 13px;
        color: var(--ink-soft);
        margin-top: 2px;
      }
      .add-btn {
        display: flex;
        align-items: center;
        gap: 7px;
        background: var(--herb);
        color: #fff;
        border: none;
        border-radius: 10px;
        padding: 10px 16px;
        font-size: 13.5px;
        font-weight: 600;
      }

      /* Filter bar */
      .filter-bar {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 18px;
        flex-wrap: wrap;
      }
      .search {
        display: flex;
        align-items: center;
        gap: 8px;
        background: var(--paper);
        border: 1px solid var(--line);
        border-radius: 9px;
        padding: 9px 12px;
        flex: 1;
        min-width: 200px;
        color: var(--ink-soft);
        font-size: 13px;
      }
      .search input {
        border: none;
        outline: none;
        font-size: 13px;
        flex: 1;
        background: none;
        color: var(--ink);
        font-family: inherit;
      }
      .chip {
        padding: 8px 14px;
        border-radius: 20px;
        border: 1px solid var(--line);
        background: var(--paper);
        font-size: 13px;
        font-weight: 500;
        color: var(--ink-soft);
        white-space: nowrap;
      }
      .chip.active {
        background: var(--herb);
        color: #fff;
        border-color: var(--herb);
      }

      /* Table */
      .panel {
        background: var(--paper);
        border: 1px solid var(--line);
        border-radius: var(--radius);
        overflow: hidden;
      }
      table {
        width: 100%;
        border-collapse: collapse;
      }
      thead th {
        text-align: left;
        font-size: 11.5px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: var(--ink-soft);
        padding: 12px 16px;
        border-bottom: 1px solid var(--line);
        background: #fafbf9;
      }
      tbody td {
        padding: 12px 16px;
        border-bottom: 1px solid var(--line);
        font-size: 13.5px;
        vertical-align: middle;
      }
      tbody tr:last-child td {
        border-bottom: none;
      }
      tbody tr:hover {
        background: #fafbf9;
      }
      .item-name-cell {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .thumb {
        width: 36px;
        height: 36px;
        border-radius: 9px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }
      .cat-pill {
        font-size: 11px;
        font-weight: 600;
        padding: 3px 9px;
        border-radius: 20px;
        display: inline-block;
      }
      .status-pill {
        font-size: 11px;
        font-weight: 600;
        padding: 3px 9px;
        border-radius: 6px;
        display: inline-block;
      }
      .status-pill.fresh {
        background: var(--herb-light);
        color: var(--herb);
      }
      .status-pill.soon {
        background: var(--amber-light);
        color: var(--amber);
      }
      .status-pill.expired {
        background: var(--coral-light);
        color: var(--coral);
      }
      .row-actions {
        display: flex;
        gap: 6px;
        justify-content: flex-end;
      }
      .icon-btn {
        width: 30px;
        height: 30px;
        border-radius: 8px;
        border: 1px solid var(--line);
        background: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        color: var(--ink-soft);
      }
      .icon-btn:hover {
        border-color: var(--herb);
        color: var(--herb);
      }
      .icon-btn.danger:hover {
        border-color: var(--coral);
        color: var(--coral);
      }

      .empty-state {
        padding: 50px 20px;
        text-align: center;
        color: var(--ink-soft);
      }

      /* Modal */
      .modal-backdrop {
        position: fixed;
        inset: 0;
        background: rgba(20, 32, 25, 0.45);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 50;
        padding: 20px;
      }
      .modal-backdrop.open {
        display: flex;
      }
      .modal {
        background: var(--paper);
        border-radius: 16px;
        width: 100%;
        max-width: 420px;
        padding: 24px;
      }
      .modal h2 {
        font-size: 17px;
        margin-bottom: 4px;
      }
      .modal .modal-sub {
        font-size: 12.5px;
        color: var(--ink-soft);
        margin-bottom: 18px;
      }
      .field {
        margin-bottom: 14px;
      }
      .field label {
        display: block;
        font-size: 12.5px;
        font-weight: 600;
        margin-bottom: 6px;
      }
      .field input,
      .field select {
        width: 100%;
        padding: 9px 11px;
        border-radius: 9px;
        border: 1px solid var(--line);
        font-size: 13.5px;
        font-family: inherit;
        outline: none;
      }
      .field input:focus,
      .field select:focus {
        border-color: var(--herb);
      }
      .field-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }
      .modal-actions {
        display: flex;
        gap: 10px;
        margin-top: 20px;
      }
      .modal-actions button {
        flex: 1;
        padding: 10px;
        border-radius: 9px;
        font-size: 13.5px;
        font-weight: 600;
        border: none;
      }
      .btn-cancel {
        background: var(--bg);
        color: var(--ink);
        border: 1px solid var(--line) !important;
      }
      .btn-save {
        background: var(--herb);
        color: #fff;
      }

      @media (max-width: 800px) {
        .sidebar {
          display: none;
        }
        thead {
          display: none;
        }
        tbody tr {
          display: block;
          padding: 12px 16px;
        }
        tbody td {
          display: flex;
          justify-content: space-between;
          align-items: center;
          border: none;
          padding: 6px 0;
        }
        tbody td::before {
          content: attr(data-label);
          font-size: 11px;
          color: var(--ink-soft);
          font-weight: 600;
        }
        .item-name-cell {
          justify-content: flex-start;
        }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <!-- SIDEBAR -->
      <aside class="sidebar">
        <div class="brand">
          <div class="mark">
            <svg
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="#fff"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z" />
              <line x1="3" y1="6" x2="21" y2="6" />
              <path d="M16 10a4 4 0 0 1-8 0" />
            </svg>
          </div>
          <div class="name">Smart Grocery<span>Planner</span></div>
        </div>
        <nav id="navList"></nav>
      </aside>

      <!-- MAIN -->
      <main class="main">
        <div class="topbar">
          <div>
            <h1>Pantry</h1>
            <div class="sub" id="itemCountSub">Loading items...</div>
          </div>
          <button class="add-btn" onclick="openModal()">
            <svg
              width="15"
              height="15"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <line x1="12" y1="5" x2="12" y2="19" />
              <line x1="5" y1="12" x2="19" y2="12" />
            </svg>
            Add item
          </button>
        </div>

        <div class="filter-bar">
          <div class="search">
            <svg
              width="15"
              height="15"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <circle cx="11" cy="11" r="8" />
              <line x1="21" y1="21" x2="16.65" y2="16.65" />
            </svg>
            <input
              type="text"
              id="searchInput"
              placeholder="Search pantry items..."
            />
          </div>
          <div id="categoryChips"></div>
        </div>

        <div class="panel">
          <table>
            <thead>
              <tr>
                <th>Item</th>
                <th>Category</th>
                <th>Quantity</th>
                <th>Purchased</th>
                <th>Status</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="tableBody"></tbody>
          </table>
          <div class="empty-state" id="emptyState" style="display: none">
            No items match your search/filter.
          </div>
        </div>
      </main>
    </div>

    <!-- ADD/EDIT MODAL -->
    <div class="modal-backdrop" id="modalBackdrop">
      <div class="modal">
        <h2 id="modalTitle">Add pantry item</h2>
        <div class="modal-sub">
          Fields marked with real inventory tracking in mind.
        </div>
        <form id="itemForm">
          <div class="field">
            <label for="fName">Item name</label>
            <input type="text" id="fName" required placeholder="e.g. Milk" />
          </div>
          <div class="field-row">
            <div class="field">
              <label for="fQty">Quantity</label>
              <input
                type="number"
                id="fQty"
                min="0"
                step="0.1"
                required
                placeholder="1"
              />
            </div>
            <div class="field">
              <label for="fUnit">Unit</label>
              <select id="fUnit">
                <option>ct</option>
                <option>g</option>
                <option>kg</option>
                <option>ml</option>
                <option>L</option>
              </select>
            </div>
          </div>
          <div class="field">
            <label for="fCategory">Category</label>
            <select id="fCategory">
              <option>Dairy</option>
              <option>Produce</option>
              <option>Pantry</option>
              <option>Meat</option>
              <option>Bakery</option>
              <option>Other</option>
            </select>
          </div>
          <div class="field-row">
            <div class="field">
              <label for="fPurchased">Purchase date</label>
              <input type="date" id="fPurchased" required />
            </div>
            <div class="field">
              <label for="fExpiry">Expiry date</label>
              <input type="date" id="fExpiry" required />
            </div>
          </div>
          <div class="modal-actions">
            <button type="button" class="btn-cancel" onclick="closeModal()">
              Cancel
            </button>
            <button type="submit" class="btn-save">Save item</button>
          </div>
        </form>
      </div>
    </div>

        svg: '<circle cx="12" cy="12" r="7.5" fill="#D3D9CE"/>',
      };
      const iconFor = (name) => itemIcon[name.toLowerCase()] || fallbackIcon;

      // ===================== Derived status =====================
      function daysUntil(dateStr) {
        const today = new Date("2026-07-07");
        const target = new Date(dateStr);
        return Math.ceil((target - today) / (1000 * 60 * 60 * 24));
      }
      function statusFor(item) {
        const d = daysUntil(item.expiry);
        if (d <= 0) return { cls: "expired", label: "Expired" };
        if (d <= 3)
          return { cls: "soon", label: `${d} day${d === 1 ? "" : "s"} left` };
        return { cls: "fresh", label: "Fresh" };
      }
      const catColor = {
        Dairy: { bg: "var(--blue-light)", fg: "var(--blue)" },
        Produce: { bg: "var(--herb-light)", fg: "var(--herb)" },
        Pantry: { bg: "var(--amber-light)", fg: "var(--amber)" },
        Meat: { bg: "var(--coral-light)", fg: "var(--coral)" },
        Bakery: { bg: "var(--plum-light)", fg: "var(--plum)" },
        Other: { bg: "#EEF2EA", fg: "var(--ink-soft)" },
      };

      // ===================== Category chips =====================
      function renderChips() {
        const categories = [
          "All",
          ...new Set(pantryItems.map((i) => i.category)),
        ];
        document.getElementById("categoryChips").innerHTML = categories
          .map(
            (c) =>
              `<button class="chip ${c === activeCategory ? "active" : ""}" onclick="setCategory('${c}')">${c}</button>`,
          )
          .join("");
      }
      function setCategory(c) {
        activeCategory = c;
        render();
      }

      // ===================== Table render =====================
      function render() {
        renderChips();
        let items = pantryItems.filter(
          (i) =>
            (activeCategory === "All" || i.category === activeCategory) &&
            i.name.toLowerCase().includes(searchTerm.toLowerCase()),
        );
        items.sort((a, b) => daysUntil(a.expiry) - daysUntil(b.expiry));

        document.getElementById("itemCountSub").textContent =
          `${pantryItems.length} items in your pantry`;

        const tbody = document.getElementById("tableBody");
        const empty = document.getElementById("emptyState");
        if (items.length === 0) {
          tbody.innerHTML = "";
          empty.style.display = "block";
          return;
        }
        empty.style.display = "none";

        tbody.innerHTML = items
          .map((item) => {
            const icon = iconFor(item.name);
            const status = statusFor(item);
            const cat = catColor[item.category] || catColor.Other;
            return `
      <tr>
        <td data-label="Item">
          <div class="item-name-cell">
            <div class="thumb" style="background:${icon.bg}"><svg width="20" height="20" viewBox="0 0 24 24">${icon.svg}</svg></div>
            <span style="font-weight:600;">${item.name}</span>
          </div>
        </td>
        <td data-label="Category"><span class="cat-pill" style="background:${cat.bg};color:${cat.fg};">${item.category}</span></td>
        <td data-label="Quantity" class="mono">${item.qty}${item.unit}</td>
        <td data-label="Purchased">${formatDate(item.purchased)}</td>
        <td data-label="Status"><span class="status-pill ${status.cls}">${status.label}</span></td>
        <td>
          <div class="row-actions">
            <button class="icon-btn" title="Edit" onclick="editItem(${item.id})">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.12 2.12 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            </button>
            <button class="icon-btn danger" title="Delete" onclick="deleteItem(${item.id})">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>
            </button>
          </div>
        </td>
      </tr>`;
          })
          .join("");
      }
      function formatDate(d) {
        return new Date(d).toLocaleDateString("en-IN", {
          day: "numeric",
          month: "short",
        });
      }

      // ===================== Search =====================
      document.getElementById("searchInput").addEventListener("input", (e) => {
        searchTerm = e.target.value;
        render();
      });

      // ===================== Modal: add / edit =====================
      function openModal() {
        editingId = null;
        document.getElementById("modalTitle").textContent = "Add pantry item";
        document.getElementById("itemForm").reset();
        document.getElementById("fPurchased").value = "2026-07-07";
        document.getElementById("modalBackdrop").classList.add("open");
      }
      function editItem(id) {
        const item = pantryItems.find((i) => i.id === id);
        if (!item) return;
        editingId = id;
        document.getElementById("modalTitle").textContent = "Edit pantry item";
        document.getElementById("fName").value = item.name;
        document.getElementById("fQty").value = item.qty;
        document.getElementById("fUnit").value = item.unit;
        document.getElementById("fCategory").value = item.category;
        document.getElementById("fPurchased").value = item.purchased;
        document.getElementById("fExpiry").value = item.expiry;
        document.getElementById("modalBackdrop").classList.add("open");
      }
      function closeModal() {
        document.getElementById("modalBackdrop").classList.remove("open");
      }
      function deleteItem(id) {
        if (!confirm("Remove this item from your pantry?")) return;
        pantryItems = pantryItems.filter((i) => i.id !== id);
        render();
      }

      document.getElementById("itemForm").addEventListener("submit", (e) => {
        e.preventDefault();
        const data = {
          name: document.getElementById("fName").value.trim(),
          qty: parseFloat(document.getElementById("fQty").value),
          unit: document.getElementById("fUnit").value,
          category: document.getElementById("fCategory").value,
          purchased: document.getElementById("fPurchased").value,
          expiry: document.getElementById("fExpiry").value,
        };
        if (editingId) {
          const idx = pantryItems.findIndex((i) => i.id === editingId);
          pantryItems[idx] = { ...pantryItems[idx], ...data };
        } else {
          pantryItems.push({ id: nextId++, ...data });
        }
        closeModal();
        render();
      });

      document
        .getElementById("modalBackdrop")
        .addEventListener("click", (e) => {
          if (e.target.id === "modalBackdrop") closeModal();
        });

      render();
    </script>
  </body>
</html>
