<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart Grocery Planner — Dashboard</title>
    <style>
      :root {
        --bg: #f4f6f2;
        --paper: #ffffff;
        --ink: #1b261e;
        --ink-soft: #677065;
        --line: #e4e9e0;

        --sidebar: #142019;
        --sidebar-text: #afc0b2;
        --sidebar-active: #22372a;

        --herb: #2f7d4f;
        --herb-light: #e3f2e7;
        --amber: #c9821f;
        --amber-light: #fbefdc;
        --coral: #c24a3c;
        --coral-light: #fbe7e3;
        --blue: #3768c2;
        --blue-light: #e7edfa;
        --plum: #7355b0;
        --plum-light: #efe8fa;

        --radius: 16px;
      }

      /* Dark theme overrides — applied when <html data-theme="dark"> */
      html[data-theme="dark"] {
        --bg: #0b120e;
        --paper: #141e18;
        --ink: #f2f6f1;
        --ink-soft: #8fa093;
        --line: #223028;

        --sidebar: #0a100d;
        --sidebar-text: #8fa093;
        --sidebar-active: #1b2c22;

        --herb-light: rgba(63, 174, 104, 0.14);
        --amber-light: rgba(224, 162, 59, 0.14);
        --coral-light: rgba(224, 107, 87, 0.14);
        --blue-light: rgba(91, 141, 239, 0.14);
        --plum-light: rgba(155, 127, 212, 0.14);
      }
      body,
      .stat-card,
      .panel,
      .item-card,
      .icon-btn-round,
      .search {
        transition:
          background-color 0.2s ease,
          border-color 0.2s ease,
          color 0.2s ease;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--ink);
        font-family:
          ui-sans-serif,
          -apple-system,
          "Segoe UI",
          Roboto,
          sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      h1,
      h2,
      h3,
      .display {
        font-family:
          ui-sans-serif,
          -apple-system,
          "Segoe UI",
          Roboto,
          sans-serif;
        font-weight: 700;
        letter-spacing: -0.01em;
        margin: 0;
      }
      .mono {
        font-family:
          ui-monospace, "SFMono-Regular", Consolas, "Liberation Mono", monospace;
        font-weight: 600;
      }
      button {
        font-family: inherit;
        cursor: pointer;
      }
      :focus-visible {
        outline: 2px solid var(--herb);
        outline-offset: 2px;
      }

      .shell {
        display: flex;
        min-height: 100vh;
      }

      /* ---------------- Sidebar ---------------- */
      .sidebar {
        width: 268px;
        flex-shrink: 0;
        background: var(--sidebar);
        color: var(--sidebar-text);
        display: flex;
        flex-direction: column;
        padding: 24px 18px;
      }
      .brand {
        display: flex;
        align-items: center;
        gap: 11px;
        padding: 6px 6px 28px;
      }
      .brand .mark {
        width: 42px;
        height: 42px;
        border-radius: 11px;
        background: var(--herb);
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }
      .brand .name {
        color: #fff;
        font-size: 16.5px;
        line-height: 1.25;
      }
      .brand .name span {
        display: block;
        font-size: 12.5px;
        color: var(--sidebar-text);
        font-weight: 400;
      }

      nav {
        display: flex;
        flex-direction: column;
        gap: 3px;
      }
      .nav-item {
        display: flex;
        align-items: center;
        gap: 13px;
        padding: 13px 14px;
        border-radius: 12px;
        font-size: 15.5px;
        font-weight: 500;
        color: var(--sidebar-text);
        border: none;
        background: none;
        text-align: left;
        width: 100%;
      }
      .nav-item svg {
        flex-shrink: 0;
        opacity: 0.85;
        width: 20px;
        height: 20px;
      }
      .nav-item:hover {
        background: #1b2c22;
        color: #fff;
      }
      .nav-item.active {
        background: var(--sidebar-active);
        color: #fff;
      }
      .nav-item.active svg {
        opacity: 1;
        color: #7cd49b;
      }

      .nav-divider {
        height: 1px;
        background: #22302a;
        margin: 18px 6px;
      }

      .upsell {
        margin-top: auto;
        background: #1b2c22;
        border: 1px solid #2a3f32;
        border-radius: 14px;
        padding: 18px;
        color: #fff;
      }
      .upsell .crown {
        font-size: 13.5px;
        font-weight: 600;
        color: #f0c75e;
        display: flex;
        align-items: center;
        gap: 6px;
        margin-bottom: 8px;
      }
      .upsell p {
        font-size: 12.5px;
        color: var(--sidebar-text);
        margin: 0 0 12px;
        line-height: 1.45;
      }
      .upsell button {
        width: 100%;
        background: var(--herb);
        color: #fff;
        border: none;
        padding: 10px;
        border-radius: 9px;
        font-size: 13.5px;
        font-weight: 600;
      }

      /* ---------------- Main ---------------- */
      .main {
        flex: 1;
        min-width: 0;
        padding: 32px 40px 60px;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 30px;
        gap: 24px;
      }
      .topbar h1 {
        font-size: 29px;
      }
      .topbar .sub {
        font-size: 14.5px;
        color: var(--ink-soft);
        margin-top: 4px;
      }

      .topbar-right {
        display: flex;
        align-items: center;
        gap: 16px;
      }
      .search {
        display: flex;
        align-items: center;
        gap: 10px;
        background: var(--paper);
        border: 1px solid var(--line);
        border-radius: 11px;
        padding: 11px 16px;
        width: 300px;
        color: var(--ink-soft);
        font-size: 14.5px;
      }
      .search input {
        border: none;
        outline: none;
        font-size: 14.5px;
        flex: 1;
        background: none;
        color: var(--ink);
        font-family: inherit;
      }

      .icon-btn-round {
        width: 44px;
        height: 44px;
        border-radius: 50%;
        background: var(--paper);
        border: 1px solid var(--line);
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--ink-soft);
        position: relative;
        flex-shrink: 0;
      }
      .icon-btn-round svg {
        width: 19px;
        height: 19px;
      }
      .badge {
        position: absolute;
        top: -4px;
        right: -4px;
        background: var(--coral);
        color: #fff;
        font-size: 10px;
        font-weight: 700;
        width: 19px;
        height: 19px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .profile {
        display: flex;
        align-items: center;
        gap: 10px;
        cursor: pointer;
      }
      .profile .av {
        width: 42px;
        height: 42px;
        border-radius: 50%;
        background: var(--herb-light);
        color: var(--herb);
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 600;
        font-size: 15px;
      }
      .profile .nm {
        font-size: 14.5px;
        font-weight: 600;
        white-space: nowrap;
      }

      /* ---------------- Stat cards ---------------- */
      .stats {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 18px;
        margin-bottom: 26px;
      }
      .stat-card {
        background: var(--paper);
        border: 1px solid var(--line);
        border-radius: var(--radius);
        padding: 22px;
      }
      .stat-card .icon {
        width: 46px;
        height: 46px;
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 14px;
      }
      .stat-card .icon svg {
        width: 21px;
        height: 21px;
      }
      .stat-card .num {
        font-size: 28px;
        display: block;
      }
      .stat-card .label {
        font-size: 13.5px;
        color: var(--ink-soft);
        margin-top: 4px;
        display: block;
      }
      .stat-card .trend {
        font-size: 12.5px;
        font-weight: 600;
        margin-top: 10px;
        display: block;
      }
      .trend.up {
        color: var(--herb);
      }
      .trend.flag {
        color: var(--amber);
      }
      .trend.warn {
        color: var(--coral);
      }
      .trend.info {
        color: var(--blue);
      }

      /* ---------------- Charts row ---------------- */
      .charts {
        display: grid;
        grid-template-columns: 1.5fr 1fr;
        gap: 20px;
        margin-bottom: 26px;
      }
      .panel {
        background: var(--paper);
        border: 1px solid var(--line);
        border-radius: var(--radius);
        padding: 24px;
      }
      .panel-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 18px;
      }
      .panel-head h2 {
        font-size: 18px;
      }
      .panel-head .select {
        font-size: 13.5px;
        color: var(--ink-soft);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 7px 12px;
        background: var(--paper);
      }
      .panel-head a,
      .view-all {
        font-size: 13.5px;
        font-weight: 600;
        color: var(--herb);
        text-decoration: none;
        background: none;
        border: none;
      }

      .chart-wrap {
        height: 280px;
        position: relative;
      }
      .donut-wrap {
        display: flex;
        align-items: center;
        gap: 22px;
      }
      .donut-canvas-box {
        width: 210px;
        height: 210px;
        flex-shrink: 0;
        position: relative;
      }
      .legend {
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .legend-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        font-size: 14px;
      }
      .legend-left {
        display: flex;
        align-items: center;
        gap: 9px;
      }
      .dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        flex-shrink: 0;
      }
      .legend-row .amt {
        font-family: "JetBrains Mono", monospace;
        font-weight: 600;
        color: var(--ink-soft);
      }

      /* ---------------- Lists row ---------------- */
      .lists {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 20px;
      }
      .list-row {
        display: flex;
        align-items: center;
        gap: 13px;
        padding: 12px 0;
        border-bottom: 1px solid var(--line);
      }
      .list-row:last-child {
        border-bottom: none;
        padding-bottom: 0;
      }
      .thumb {
        width: 48px;
        height: 48px;
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }
      .thumb svg {
        width: 26px;
        height: 26px;
      }
      .list-info {
        flex: 1;
        min-width: 0;
      }
      .list-info .nm {
        font-size: 14.5px;
        font-weight: 600;
      }
      .list-info .sub {
        font-size: 12.5px;
        color: var(--ink-soft);
        margin-top: 2px;
      }
      .tag {
        font-size: 12px;
        font-weight: 600;
        padding: 4px 10px;
        border-radius: 7px;
        white-space: nowrap;
      }
      .tag.danger {
        background: var(--coral-light);
        color: var(--coral);
      }
      .tag.warn {
        background: var(--amber-light);
        color: var(--amber);
      }

      .activity-row {
        display: flex;
        align-items: flex-start;
        gap: 13px;
        padding: 12px 0;
        border-bottom: 1px solid var(--line);
      }
      .activity-row:last-child {
        border-bottom: none;
        padding-bottom: 0;
      }
      .act-icon {
        width: 38px;
        height: 38px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        margin-top: 1px;
      }
      .act-icon svg {
        width: 17px;
        height: 17px;
      }
      .act-info .tx {
        font-size: 14px;
        line-height: 1.45;
      }
      .act-info .ts {
        font-size: 12.5px;
        color: var(--ink-soft);
        margin-top: 3px;
      }

      @media (max-width: 1300px) {
        .stats {
          grid-template-columns: repeat(3, 1fr);
        }
        .charts {
          grid-template-columns: 1fr;
        }
        .lists {
          grid-template-columns: 1fr;
        }
      }
      @media (max-width: 900px) {
        .sidebar {
          display: none;
        }
        .stats {
          grid-template-columns: repeat(2, 1fr);
        }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <!-- ============ SIDEBAR ============ -->
      <aside class="sidebar">
        <div class="brand">
          <div class="mark">
            <svg
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="none"
              stroke="#fff"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z" />
              <line x1="3" y1="6" x2="21" y2="6" />
              <path d="M16 10a4 4 0 0 1-8 0" />
            </svg>
          </div>
          <div class="name">Smart Grocery<span>Planner</span></div>
        </div>

        <nav id="navList"></nav>

        <div class="upsell">
          <div class="crown">
            <svg
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="#F0C75E"
              stroke="none"
            >
              <path d="M2 19h20l-2-9-5 4-3-7-3 7-5-4z" />
            </svg>
            Go premium
          </div>
          <p>Unlock AI predictions, smart recipes and price comparisons.</p>
          <button onclick="alert('Would open upgrade flow')">
            Upgrade now
          </button>
        </div>
      </aside>

      <!-- ============ MAIN ============ -->
      <main class="main">
        <div class="topbar">
          <div>
            <h1 id="greetingHeading">Good morning, Ayush</h1>
            <div class="sub">
              Here's what's happening with your groceries today.
            </div>
          </div>
          <div class="topbar-right">
            <div class="search">
              <svg
                width="17"
                height="17"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <circle cx="11" cy="11" r="8" />
                <line x1="21" y1="21" x2="16.65" y2="16.65" />
              </svg>
              <input type="text" placeholder="Search items, categories..." />
            </div>
            <div
              class="icon-btn-round"
              title="Toggle theme"
              id="themeToggleBtn"
              onclick="toggleTheme()"
            >
              <svg
                id="themeIcon"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="1.8"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <circle cx="12" cy="12" r="4.5" />
                <line x1="12" y1="1.5" x2="12" y2="4" />
                <line x1="12" y1="20" x2="12" y2="22.5" />
                <line x1="4.2" y1="4.2" x2="6" y2="6" />
                <line x1="18" y1="18" x2="19.8" y2="19.8" />
                <line x1="1.5" y1="12" x2="4" y2="12" />
                <line x1="20" y1="12" x2="22.5" y2="12" />
                <line x1="4.2" y1="19.8" x2="6" y2="18" />
                <line x1="18" y1="6" x2="19.8" y2="4.2" />
              </svg>
            </div>
            <div class="icon-btn-round" title="Notifications">
              <svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="1.8"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9" />
                <path d="M13.73 21a2 2 0 0 1-3.46 0" />
              </svg>
              <span class="badge">3</span>
            </div>
            <div class="profile">
              <div class="av" id="profileAvatar">AK</div>
              <div class="nm" id="profileName">Ayush Kumar</div>
              <svg
                width="15"
                height="15"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <polyline points="6 9 12 15 18 9" />
              </svg>
            </div>
          </div>
        </div>

        <!-- Stats -->
        <div class="stats" id="statsRow"></div>

        <!-- Charts -->
        <div class="charts">
          <div class="panel">
            <div class="panel-head">
              <h2>Monthly expense overview</h2>
              <select class="select">
                <option>This month</option>
                <option>Last 6 months</option>
              </select>
            </div>
            <div class="chart-wrap" id="lineChart"></div>
          </div>
          <div class="panel">
            <div class="panel-head">
              <h2>Category-wise expense</h2>
              <select class="select">
                <option>This month</option>
              </select>
            </div>
            <div class="donut-wrap">
              <div class="donut-canvas-box" id="pieChart"></div>
              <div class="legend" id="legendList"></div>
            </div>
          </div>
        </div>

        <!-- Lists -->
        <div class="lists">
          <div class="panel">
            <div class="panel-head">
              <h2>Expiring soon</h2>
              <button
                class="view-all"
                onclick="alert('Would open Pantry filtered to expiring items')"
              >
                View all
              </button>
            </div>
            <div id="expiringList"></div>
          </div>
          <div class="panel">
            <div class="panel-head">
              <h2>Low stock items</h2>
              <button
                class="view-all"
                onclick="alert('Would open Shopping List')"
              >
                View all
              </button>
            </div>
            <div id="lowStockList"></div>
          </div>
          <div class="panel">
            <div class="panel-head"><h2>Recent activity</h2></div>
            <div id="activityList"></div>
          </div>
        </div>
      </main>
    </div>

    <script>
      // ===================== Theme toggle (dark / light) =====================
      const sunIcon =
        '<circle cx="12" cy="12" r="4.5"/><line x1="12" y1="1.5" x2="12" y2="4"/><line x1="12" y1="20" x2="12" y2="22.5"/><line x1="4.2" y1="4.2" x2="6" y2="6"/><line x1="18" y1="18" x2="19.8" y2="19.8"/><line x1="1.5" y1="12" x2="4" y2="12"/><line x1="20" y1="12" x2="22.5" y2="12"/><line x1="4.2" y1="19.8" x2="6" y2="18"/><line x1="18" y1="6" x2="19.8" y2="4.2"/>';
      const moonIcon =
        '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';

      function applyTheme(theme) {
        document.documentElement.setAttribute("data-theme", theme);
        document.getElementById("themeIcon").innerHTML =
          theme === "dark" ? moonIcon : sunIcon;
        localStorage.setItem("sgp_theme", theme);
      }
      function toggleTheme() {
        const current =
          document.documentElement.getAttribute("data-theme") || "light";
        applyTheme(current === "dark" ? "light" : "dark");
      }
      // Apply saved preference immediately on load (defaults to light if none saved)
      applyTheme(localStorage.getItem("sgp_theme") || "light");

      // ===================== Personalize from login (if available) =====================
      // Falls back to the default mock name if the user opened this page directly
      // without going through login.html first.
      let currentUser = { name: "Ayush Kumar", initials: "AK", email: null };
      try {
        const stored = JSON.parse(localStorage.getItem("sgp_user"));
        if (stored && stored.name) {
          currentUser = {
            name: stored.name,
            initials:
              stored.initials ||
              stored.name
                .split(" ")
                .map((w) => w[0])
                .join("")
                .slice(0, 2)
                .toUpperCase(),
            email: stored.email || null,
          };
        }
      } catch (e) {
        /* no stored user yet, use default */
      }

      const firstName = currentUser.name.split(" ")[0];
      document.getElementById("greetingHeading").textContent =
        `Good morning, ${firstName}`;
      document.getElementById("profileAvatar").textContent =
        currentUser.initials;
      document.getElementById("profileName").textContent = currentUser.name;
      const navItems = [
        {
          label: "Dashboard",
          active: true,
          href: "dashboard.html",
          icon: '<path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>',
        },
        {
          label: "Pantry",
          href: "pantry.html",
          icon: '<path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/>',
        },
        {
          label: "Shopping list",
          href: "shopping_list.html",
          icon: '<path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>',
        },
        {
          label: "Recipes",
          href: "recipe.html",
          icon: '<path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>',

      // ===================== Line chart (pure inline SVG, no library) =====================
      function renderLineChart() {
        const W = 600,
          H = 240,
          padTop = 20,
          padBottom = 32,
          padLeft = 46,
          padRight = 12;
        const values = monthlyExpense.map((d) => d.v);
        const niceMax = Math.ceil(Math.max(...values) / 1000) * 1000;
        const plotH = H - padTop - padBottom;
        const plotW = W - padLeft - padRight;
        const stepX = plotW / (monthlyExpense.length - 1);

        // Read the current theme's actual colors instead of hardcoding
        // light-theme hex values, so gridlines/text stay subtle in dark mode too.
        const cs = getComputedStyle(document.documentElement);
        const lineColor = cs.getPropertyValue("--line").trim() || "#E4E9E0";
        const softColor = cs.getPropertyValue("--ink-soft").trim() || "#677065";

        const x = (i) => padLeft + i * stepX;
        const y = (v) => padTop + plotH - (v / niceMax) * plotH;

        const points = monthlyExpense.map((d, i) => ({
          x: x(i),
          y: y(d.v),
          m: d.m,
          v: d.v,
        }));
        const linePath = points
          .map(
            (p, i) =>
              (i === 0 ? "M" : "L") + p.x.toFixed(1) + "," + p.y.toFixed(1),
          )
          .join(" ");
        const areaPath =
          linePath +
          ` L${points[points.length - 1].x.toFixed(1)},${(padTop + plotH).toFixed(1)} L${points[0].x.toFixed(1)},${(padTop + plotH).toFixed(1)} Z`;

        // 4 evenly spaced ticks (0 to max) — fewer, cleaner lines instead of a busy grid
        const ticks = [0, 1 / 3, 2 / 3, 1].map(
          (f) => Math.round((niceMax * f) / 50) * 50,
        );
        const gridLines = ticks
          .map((t) => {
            const gy = y(t);
            return `<line x1="${padLeft}" y1="${gy}" x2="${W - padRight}" y2="${gy}" stroke="${lineColor}" stroke-width="1" stroke-dasharray="3 4" opacity="0.6"/>
              <text x="${padLeft - 10}" y="${gy + 4}" font-size="11.5" fill="${softColor}" text-anchor="end">₹${(t / 1000).toFixed(t % 1000 === 0 ? 0 : 2)}k</text>`;
          })
          .join("");

        const dots = points
          .map(
            (p) =>
              `<circle cx="${p.x}" cy="${p.y}" r="5" fill="#2F7D4F" stroke="var(--paper)" stroke-width="2.5"><title>${p.m}: ₹${p.v.toLocaleString("en-IN")}</title></circle>`,
          )
          .join("");

        const labels = points
          .map(
            (p) =>
              `<text x="${p.x}" y="${H - 8}" font-size="12.5" fill="${softColor}" text-anchor="middle">${p.m}</text>`,
          )
          .join("");

        document.getElementById("lineChart").innerHTML = `
      <svg viewBox="0 0 ${W} ${H}" width="100%" height="100%" preserveAspectRatio="none" style="overflow:visible">
        <defs>
          <linearGradient id="lineGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#3FAE68" stop-opacity="0.28"/>
            <stop offset="100%" stop-color="#3FAE68" stop-opacity="0"/>
          </linearGradient>
        </defs>
        ${gridLines}
        <path d="${areaPath}" fill="url(#lineGrad)" stroke="none"/>
        <path d="${linePath}" fill="none" stroke="#3FAE68" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
        ${dots}
        ${labels}
      </svg>`;
      }
      renderLineChart();

      // ===================== Pie chart (pure CSS conic-gradient, no library) =====================
      function renderPieChart() {
        const total = categorySpend.reduce((s, c) => s + c.amt, 0);
        let cursor = 0;
        const stops = categorySpend
          .map((c) => {
            const start = (cursor / total) * 100;
            cursor += c.amt;
            const end = (cursor / total) * 100;
            return `${c.color} ${start.toFixed(2)}% ${end.toFixed(2)}%`;
          })
          .join(", ");

        document.getElementById("pieChart").innerHTML = `
      <div role="img" aria-label="Pie chart of category-wise expense"
           style="width:210px;height:210px;border-radius:50%;
                  background:conic-gradient(${stops});
                  box-shadow:0 0 0 3px var(--paper), 0 0 0 4px var(--line);"></div>`;
      }
      renderPieChart();

      // Re-render both charts when the theme changes, since their colors
      // are read from CSS variables at render time, not live-bound.
      const _origApplyTheme = applyTheme;
      applyTheme = function (theme) {
        _origApplyTheme(theme);
        if (document.getElementById("lineChart")) renderLineChart();
        if (document.getElementById("pieChart")) renderPieChart();
      };
